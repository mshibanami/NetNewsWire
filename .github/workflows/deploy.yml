name: Deploy to Apple

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        required: true
        default: "iOS"
        type: choice
        options:
          - iOS
          - macOS

jobs:
  deploy:
    name: Deploy to TestFlight
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Generate Secrets Sources
        run: ./buildscripts/updateSecrets.sh

      - name: Set Build Number
        run: |
          BUILD_NUMBER=$((7000 + ${{ github.run_number }}))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "Setting build number to $BUILD_NUMBER"

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build and Deploy (Fastlane)
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          export MATCH_GIT_BASIC_AUTHORIZATION=$(echo -n "x-access-token:$GH_PAT" | base64)
          if [ "${{ github.event.inputs.platform }}" = "iOS" ]; then
            bundle exec fastlane ios beta build_number:${{ env.BUILD_NUMBER }}
          else
            bundle exec fastlane mac release build_number:${{ env.BUILD_NUMBER }}
          fi
